spring.application.name=academic-university-service

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/academic_university_service}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

jwt.secret=${JWT_SECRET:claveSecretaAltamenteSeguraParaGenerarTokensJWT123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ}
jwt.expiration=${JWT_EXPIRATION:3600000}

server.port=${PORT:8082}

spring.jpa.hibernate.ddl-auto=update